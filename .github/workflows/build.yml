name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mo-linux

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mo-windows

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mo-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-v${{ steps.version.outputs.version }}
          path: target/${{ matrix.target }}/release/mo${{ matrix.os == 'windows-latest' && '.exe' || '' }}
